<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusMate – Campus Navigation</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1e3a5f 0%, #0d1b2a 100%);
      color: #e8e8e8;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { opacity: 0.9; max-width: 420px; margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: #1e88e5;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #1565c0; }
  </style>
</head>
<body>
  <h1>CampusMate</h1>
  <p>Smart indoor navigation for PR Pote Patil College of Engineering and Management, Amravati. Find rooms, get directions, and book spaces.</p>
  <a href="YOUR_STREAMLIT_APP_URL" target="_blank" rel="noopener">Open CampusMate app →</a>
  <p style="margin-top: 2rem; font-size: 0.85rem; opacity: 0.7;">Replace YOUR_STREAMLIT_APP_URL in index.html with your Streamlit Community Cloud app URL after deploying there.</p>
</body>
</html>
